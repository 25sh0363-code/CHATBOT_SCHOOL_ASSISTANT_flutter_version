name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "mobile_app/**"
      - ".github/workflows/build-windows-exe.yml"

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: mobile_app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release --dart-define=BACKEND_BASE_URL=https://school-assistant-backend.onrender.com --dart-define=VECTOR_ZIP_URL=

      - name: Package Windows app
        shell: pwsh
        run: |
          $outDir = "build/windows/x64/runner/Release"
          $zipPath = "build/windows/SINOVATE-windows-release.zip"
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          Compress-Archive -Path "$outDir/*" -DestinationPath $zipPath

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SINOVATE-windows-release
          path: mobile_app/build/windows/SINOVATE-windows-release.zip
