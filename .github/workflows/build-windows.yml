name: Build Windows Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'mobile_app/**'
      - '.github/workflows/build-windows.yml'

jobs:
  build-windows:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: mobile_app
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Zip Windows release
        run: |
          $releaseDir = Join-Path $env:GITHUB_WORKSPACE 'mobile_app\build\windows\x64\runner\Release'
          $zipPath = Join-Path $env:GITHUB_WORKSPACE 'mobile_app\build\windows\x64\runner\sinovate-windows-release.zip'
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }
          Compress-Archive -Path (Join-Path $releaseDir '*') -DestinationPath $zipPath -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sinovate-windows-release
          path: mobile_app/build/windows/x64/runner/sinovate-windows-release.zip
          if-no-files-found: error
